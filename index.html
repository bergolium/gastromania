    --bg: #111111;
    --surface: #1c1c1c;
    --border: #2e2e2e;
    --gold: #cccccc;
    --gold-light: #e0e0e0;
    --cream: #f0f0f0;
    --muted: #888888;

    --ristoranti: #7bc8a4;
    --pizza: #f4907a;
    --pasticcerie: #b89fd4;
    --gelati: #7ec8e3;
    --vino: #e8849a;
    --birra: #f5d080;
    --caffe: #7aaed6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: #f0f0f0;
    font-family: 'Titillium Web', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 4px 10px;
    display: flex;
    align-items: center;
    gap: 12px;
    min-height: 64px;
    flex-shrink: 0;
    position: relative;
    z-index: 1000;
  }

  .brand {
    display: flex;
    flex-direction: row;
    align-items: center;
    line-height: 1;
    flex-shrink: 0;
  }
  .brand > div {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .brand-city {
    font-family: 'Titillium Web', sans-serif;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.22em;
    color: #aaaaaa;
    text-transform: uppercase;
  }
  .brand-name {
    font-family: 'Titillium Web', sans-serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--cream);
    letter-spacing: 0.02em;
  }
  .brand-tagline {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.10em;
    text-transform: uppercase;
    margin-top: 1px;
    line-height: 1;
  }
  .brand-icon {
  font-family: 'Material Symbols Rounded';
  font-size: 20px;
  color: var(--cream);
  margin-right: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

  /* FILTERS */
  .filters {
    display: flex;
    gap: 5px;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0;
    align-items: center;
  }
  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: 'Titillium Web', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
  }
  .filter-btn .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .filter-btn.active {
    border-color: currentColor;
    color: var(--cream);
    background: rgba(255,255,255,0.05);
  }
  .filter-btn:hover { opacity: 0.85; }

  .filter-btn.all { color: #cccccc; }
  .filter-btn.all.active { border-color: #cccccc; background: rgba(255,255,255,0.06); }

  .count-badge {
    background: rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 1px 5px;
    font-size: 9px;
    font-weight: 400;
  }

  /* LAYOUT */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* MAP */
  #map {
    flex: 1;
    background: #1a1812;
  }

  /* SIDEBAR */
  .sidebar {
    width: 260px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #aaaaaa;
    text-transform: uppercase;
    font-weight: 500;
  }
  .sidebar-count {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  .place-list {
    overflow-y: auto;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .place-list::-webkit-scrollbar { width: 3px; }
  .place-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .place-item {
    padding: 10px 16px;
    border-bottom: 1px solid rgba(46,42,34,0.5);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .place-item:hover { background: rgba(255,255,255,0.04); }
  .place-item.highlighted { background: rgba(255,255,255,0.06); }

  .place-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .place-name {
    font-size: 12px;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.3;
    flex: 1;
  }
  .place-cat {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .leaflet-popup-content,
  .leaflet-popup-content * {
    font-family: 'Titillium Web', sans-serif !important;
  }
  .leaflet-popup-content-wrapper {
    background: #ffffff !important;
    border: 1px solid #e0e0e0 !important;
    border-radius: 8px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
    padding: 0 !important;
  }
  .leaflet-popup-content {
    margin: 0 !important;
    width: auto !important;
    min-width: 180px;
  }
  .leaflet-popup-tip { background: #ffffff !important; }
  .leaflet-popup-close-button { color: #888888 !important; top: 8px !important; right: 10px !important; font-size: 16px !important; }

  .popup-inner {
    padding: 14px 16px 12px;
  }
  .popup-cat {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 5px;
  }
  .popup-name {

    font-size: 15px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.25;
    margin-bottom: 8px;
  }
  .popup-desc {
    font-size: 11px;
    color: var(--muted);

  .popup-details { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .popup-row { font-size: 11px; color: #444444; line-height: 1.4; }

  .popup-row a:hover { text-decoration: underline; }
  .popup-hours.open { color: #7bc8a4; }
  .popup-hours.closed { color: #f4907a; }
  .popup-loading { font-style: italic; }
  .popup-desc a:hover { text-decoration: underline; }

    color: var(--muted);

    text-transform: uppercase;

    height: 48px;

    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay {

      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1400;

    .sidebar-overlay.open { display: block; }
    .sidebar-toggle { display: flex; }
    footer { display: none; }

</head>

const CAT_COLORS = {
  RISTORANTI: "#7bc8a4",
  PIZZA:      "#f4907a",
  PASTICCERIE:"#b89fd4",
  GELATI:     "#7ec8e3",
  VINO:       "#e8849a",
  BIRRA:      "#f5d080",
  CAFFE:      "#7aaed6",
};

const CAT_LABELS = {
  RISTORANTI: "Ristoranti / Restaurants",
  PIZZA:      "Pizza · Pane · Pasta / Pizza · Bread · Pasta",
  PASTICCERIE:"Pasticcerie / Pastry Shops",
  GELATI:     "Gelati / Ice Cream",
  VINO:       "Vino / Wine",
  BIRRA:      "Birra / Beer",
  CAFFE:      "Caffè · Cocktail & Spirits",
};

const CAT_LABELS_SHORT = {
  RISTORANTI: "Restaurants",
  PIZZA:      "Pizza · Bread · Pasta",
  PASTICCERIE:"Pastry Shops",
  GELATI:     "Ice Cream",
  VINO:       "Wine",

  CAFFE:      "Caffè · Cocktail",
};

// Init map
const map = L.map('map', {
  center: [44.9130, 8.6160],
  zoom: 15,
  zoomControl: false,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

L.control.zoom({ position: 'topleft' }).addTo(map);

// Build markers
const markers = [];
const layerGroups = {};
Object.keys(CAT_COLORS).forEach(c => layerGroups[c] = L.layerGroup().addTo(map));

const CAT_ICONS = {
  RISTORANTI: "restaurant",
  PIZZA:      "local_pizza",
  PASTICCERIE:"cake",
  GELATI:     "icecream",
  VINO:       "wine_bar",
  BIRRA:      "sports_bar",
  CAFFE:      "local_cafe",
};

function makeIcon(color, cat) {
  const icon = CAT_ICONS[cat] || "restaurant";
  return L.divIcon({
    className: '',
    html: `<div style="
      width:30px;height:30px;
      background:${color};
      border-radius:50%;
      border:2px solid white;
      display:flex;align-items:center;justify-content:center;
    "><span class="material-symbols-rounded" style="font-size:16px;color:white;line-height:1;user-select:none;">${icon}</span></div>`,
    iconSize: [30,30],
    iconAnchor: [15,15],
    popupAnchor: [0,-17],
  });
}

PLACES.forEach((p, i) => {
  const color = CAT_COLORS[p.cat];
  const marker = L.marker([p.lat, p.lng], { icon: makeIcon(color, p.cat) });

  marker.bindPopup(`
    <div class="popup-inner">
      <div class="popup-cat" style="color:${color}">${CAT_LABELS_SHORT[p.cat]}</div>
      <div class="popup-name">${p.name}</div>
    </div>
  `, { maxWidth: 260, className: '' });

  marker.on('click', () => {
    highlightItem(i);
    openPlacesPopup(marker, p);
  });
  layerGroups[p.cat].addLayer(marker);
  markers.push({ marker, data: p, index: i });
});

// Sidebar
function buildList(filter) {
  const list = document.getElementById('place-list');
  list.innerHTML = '';

  let filtered;
  if (filter === 'none') {
    filtered = [];
  } else if (filter === 'all') {
    filtered = PLACES;
  } else if (filter === 'multi') {
    filtered = PLACES.filter(p => activeFilters.has(p.cat));
  } else {
    filtered = PLACES.filter(p => p.cat === filter);
  }

  document.getElementById('sidebar-count').textContent = `${filtered.length} local${filtered.length !== 1 ? 'i' : 'e'}`;

  filtered.forEach((p) => {
    const globalIndex = PLACES.indexOf(p);
    const color = CAT_COLORS[p.cat];
    const item = document.createElement('div');
    item.className = 'place-item';
    item.id = `item-${globalIndex}`;
    const dot = document.createElement('div');
dot.className = 'place-dot';
dot.style.background = color;

const wrap = document.createElement('div');

const name = document.createElement('div');
name.className = 'place-name';
name.textContent = p.name;
wrap.appendChild(name);

if (activeFilters.size !== 1) {
  const cat = document.createElement('div');
  cat.className = 'place-cat';
  cat.textContent = CAT_LABELS_SHORT[p.cat];
  wrap.appendChild(cat);
}

item.appendChild(dot);
item.appendChild(wrap);
    item.addEventListener('click', () => {
      highlightItem(globalIndex);
      const target = [p.lat - 0.0008, p.lng];
      map.once('moveend', () => {
        openPlacesPopup(markers[globalIndex].marker, PLACES[globalIndex]);
      });
      map.flyTo(target, 18, {animate: true, duration: 0.6});
    });
    list.appendChild(item);
  });
}

function highlightItem(globalIndex) {
  document.querySelectorAll('.place-item').forEach(el => el.classList.remove('highlighted'));
  const el = document.getElementById(`item-${globalIndex}`);
  if (el) {
    el.classList.add('highlighted');
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// Counts
const counts = {};
Object.keys(CAT_COLORS).forEach(c => counts[c] = 0);
PLACES.forEach(p => counts[p.cat]++);
document.getElementById('cnt-all').textContent = PLACES.length;
Object.keys(counts).forEach(c => {
  const el = document.getElementById('cnt-' + c);
  if (el) el.textContent = counts[c];
});

// Filter logic
const activeFilters = new Set(Object.keys(CAT_COLORS));

function syncAllBtn() {
  const allBtn = document.querySelector('.filter-btn.all');
  allBtn.classList.toggle('active', activeFilters.size === Object.keys(CAT_COLORS).length);
}

function rebuildSidebar() {
  if (activeFilters.size === 0) {
    buildList('none');
  } else if (activeFilters.size === Object.keys(CAT_COLORS).length) {
    buildList('all');
  } else if (activeFilters.size === 1) {
    buildList([...activeFilters][0]);
  } else {
    buildList('multi');
  }
}

function filterCat(cat, btn) {
  if (cat === 'all') {
    const allActive = activeFilters.size === Object.keys(CAT_COLORS).length;
    if (allActive) {
      // Tutti attivi → pulisci tutto
      activeFilters.clear();
      Object.keys(CAT_COLORS).forEach(c => layerGroups[c].remove());
      document.querySelectorAll('.filter-btn:not(.all)').forEach(b => b.classList.remove('active'));
      btn.classList.remove('active');
    } else {
      // Attiva tutte le categorie
      Object.keys(CAT_COLORS).forEach(c => {
        activeFilters.add(c);
        layerGroups[c].addTo(map);
      });
      document.querySelectorAll('.filter-btn:not(.all)').forEach(b => b.classList.add('active'));
      btn.classList.add('active');
    }
  } else {
  if (activeFilters.has(cat)) {
    activeFilters.delete(cat);
    layerGroups[cat].remove();
    btn.classList.remove('active');
  } else {
    activeFilters.add(cat);
    layerGroups[cat].addTo(map);
    btn.classList.add('active');
  }

  syncAllBtn();
}
rebuildSidebar();
}

const placesCache = new Map();
async function openPlacesPopup(marker, p) {
  const color = CAT_COLORS[p.cat];
  marker.bindPopup(`
    <div class="popup-inner">
      <div class="popup-cat" style="color:${color}">${CAT_LABELS_SHORT[p.cat]}</div>
      <div class="popup-name">${p.name}</div>
      <div class="popup-desc popup-loading">⏳ Caricamento...</div>
    </div>
  `, { maxWidth: 260 }).openPopup();
  const cacheKey = `${p.name}|${p.lat}|${p.lng}`;
if (placesCache.has(cacheKey)) {
  marker.getPopup().setContent(placesCache.get(cacheKey));
  return;
}

  try {
    await google.maps.importLibrary('places');
    const { Place } = google.maps.places;
    const request = {
      textQuery: p.name + ' Alessandria Italia',
      fields: ['displayName','formattedAddress','nationalPhoneNumber','websiteURI','regularOpeningHours','rating','userRatingCount'],
      locationBias: { lat: p.lat, lng: p.lng },
      language: 'it',
    };
    const { places } = await Place.searchByText(request);
    if (!places || places.length === 0) {
  const popupHtml = `
    <div class="popup-inner">
      <div class="popup-cat" style="color:${color}">${CAT_LABELS_SHORT[p.cat]}</div>
      <div class="popup-name">${p.name}</div>
    </div>`;
  placesCache.set(cacheKey, popupHtml);
  marker.getPopup().setContent(popupHtml);
  return;
}
    const place = places[0];
const addr = place.formattedAddress ? `<div class="popup-row"><span class="material-symbols-rounded" style="font-size:13px;vertical-align:middle;margin-right:4px;">location_on</span><a href="https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}" target="_blank" style="color:#444444;text-decoration:none;">${place.formattedAddress.replace(', Italia','').replace(', Italy','')}</a></div>` : '';
const phone = place.nationalPhoneNumber ? `<div class="popup-row"><span class="material-symbols-rounded" style="font-size:13px;vertical-align:middle;margin-right:4px;">call</span><a href="tel:${place.nationalPhoneNumber.replace(/[^\d+]/g, '')}">${place.nationalPhoneNumber}</a></div>` : '';
const web = place.websiteURI ? `<div class="popup-row"><span class="material-symbols-rounded" style="font-size:13px;vertical-align:middle;margin-right:4px;">language</span><a href="${place.websiteURI}" target="_blank">${new URL(place.websiteURI).hostname.replace('www.','')}</a></div>` : '';
const rating = place.rating ? `<div class="popup-row"><span class="material-symbols-rounded" style="font-size:13px;vertical-align:middle;margin-right:4px;">star</span>${place.rating} <span style="color:var(--muted)">(${place.userRatingCount} recensioni)</span></div>` : '';
let hours = '';
if (place.regularOpeningHours?.periods?.length) {
  const now = new Date();
  const nowDay = now.getDay();
  const nowMinutes = nowDay * 1440 + now.getHours() * 60 + now.getMinutes();
  let isOpen = false;

  for (const period of place.regularOpeningHours.periods) {
    if (period.open?.day == null || period.open?.hour == null || period.open?.minute == null) continue;

    const openMinutes = period.open.day * 1440 + period.open.hour * 60 + period.open.minute;

    let closeMinutes;
    if (period.close?.day != null && period.close?.hour != null && period.close?.minute != null) {
      closeMinutes = period.close.day * 1440 + period.close.hour * 60 + period.close.minute;
    } else {
      closeMinutes = openMinutes + 1440;
    }

    if (closeMinutes <= openMinutes) {
      closeMinutes += 7 * 1440;
    }

    if (
      (nowMinutes >= openMinutes && nowMinutes <= closeMinutes) ||
      (nowMinutes + 7 * 1440 >= openMinutes && nowMinutes + 7 * 1440 <= closeMinutes)
    ) {
      isOpen = true;
      break;
    }
  }

  hours = `<div class="popup-row popup-hours ${isOpen ? 'open' : 'closed'}"><span class="material-symbols-rounded" style="font-size:13px;vertical-align:middle;margin-right:4px;">${isOpen ? 'check_circle' : 'cancel'}</span>${isOpen ? 'Aperto ora' : 'Chiuso ora'}</div>`;
}
    const popupHtml = `
  <div class="popup-inner">
    <div class="popup-cat" style="color:${color}">${CAT_LABELS_SHORT[p.cat]}</div>
    <div class="popup-name">${p.name}</div>
    <div class="popup-details">${rating}${hours}${addr}${phone}${web}</div>
  </div>`;
placesCache.set(cacheKey, popupHtml);
marker.getPopup().setContent(popupHtml);
  } catch(e) {
  console.error('Places error:', e);
  const popupHtml = `
    <div class="popup-inner">
      <div class="popup-cat" style="color:${color}">${CAT_LABELS_SHORT[p.cat]}</div>
      <div class="popup-name">${p.name}</div>
    </div>`;
  placesCache.set(cacheKey, popupHtml);
  marker.getPopup().setContent(popupHtml);
}
}

logoEl.src = 'logo.png';
logoEl.onload = () => { logoEl.style.display = 'block'; };

buildList('all');
</script>

<script>

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const btn = document.getElementById('sidebar-toggle');
  const isOpen = sidebar.classList.toggle('open');
  overlay.classList.toggle('open');
  btn.innerHTML = isOpen ? '&times;' : '&#9776;';
}
function closeSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const overlay = document.getElementById('sidebar-overlay');
  const btn = document.getElementById('sidebar-toggle');
  sidebar.classList.remove('open');
  overlay.classList.remove('open');
  btn.innerHTML = '&#9776;';
}
</script>
